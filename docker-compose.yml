services:
  postgres:
    image: postgres:16-alpine
    container_name: newsera-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsera
      POSTGRES_PASSWORD: newsera
      POSTGRES_DB: newsera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
