services:
  postgres:
    image: postgres:16-alpine
    container_name: newsera-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsera
      POSTGRES_PASSWORD: newsera
      POSTGRES_DB: newsera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newsera-frontend
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 | grep -q NewsEra || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  hardhat-node:
    build:
      context: ./blockchain
      dockerfile: Dockerfile.node
    container_name: newsera-hardhat
    ports:
      - "8545:8545"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const h=require('http');const r=h.request({hostname:'localhost',port:8545,method:'POST',headers:{'Content-Type':'application/json'}},res=>{let d='';res.on('data',c=>d+=c);res.on('end',()=>process.exit(d.includes('result')?0:1))});r.write('{\\\"jsonrpc\\\":\\\"2.0\\\",\\\"method\\\":\\\"eth_blockNumber\\\",\\\"params\\\":[],\\\"id\\\":1}');r.end()\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
